<!DOCTYPE html>
<html>
<head>
    <title>Post Form</title>
</head>
<body>
    <h1>Post Form</h1>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    
    <a href="{% url 'post_list' %}">Back</a>
</body>
</html>
