<!DOCTYPE html>
<html>
<head><title>Posts</title></head>
<body>
    <h1>Posts</h1>

    {% if perms.Post.add_post %}
        <a href="{% url 'post_create' %}">New Post</a>
    {% endif %}

    {% for post in posts %}
        <div>
            {% if post.image %}
                <img src="{{ post.image.url }}" width="200">
            {% endif %}
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <a href="{% url 'post_detail' post.pk %}">View</a>

            {% if perms.Post.change_post %}
                <a href="{% url 'post_update' post.pk %}">Edit</a>
            {% endif %}

            {% if perms.Post.delete_post %}
                <a href="{% url 'post_delete' post.pk %}">Delete</a>
            {% endif %}
        </div>
        <hr>
    {% endfor %}
</body>
</html>
