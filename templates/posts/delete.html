{% extends 'base.html' %}

{% block title %}Postni o'chirish{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white py-3">
                <h5 class="mb-0 text-center">🗑️ Postni o'chirishni tasdiqlang</h5>
            </div>
            
            <div class="card-body p-4 text-center">
                <p class="lead mb-4">
                    Haqiqatan ham ushbu postni o'chirib tashlamoqchimisiz?
                </p>
                
                <div class="alert alert-warning border-start border-4 border-warning">
                    <strong>Ogohlantirish:</strong> O'chirilgan ma'lumotlarni qayta tiklab bo'lmaydi!
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center mt-4">
                        <button type="submit" class="btn btn-danger px-4 shadow-sm">
                             Ha, o'chirilsin
                        </button>
                        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary px-4 shadow-sm">
                            Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
