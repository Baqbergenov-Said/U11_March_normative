{% extends 'base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header">
                <h4>🔐 Tizimga kirish</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Parol</label>
                        {{ form.password }}
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Username yoki parol noto'g'ri!
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-primary w-100">
                        🔑 Kirish
                    </button>
                </form>

                <hr>
                <p class="text-center">
                    Akkauntingiz yo'qmi?
                    <a href="{% url 'accounts:register' %}">Ro'yxatdan o'ting</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
