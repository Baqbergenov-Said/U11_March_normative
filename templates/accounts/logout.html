{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Logout" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow text-center">
            <div class="card-body py-4">

                <div class="mb-3" style="font-size: 3rem;">👋</div>
                <h4 class="mb-2">{% trans "Are you sure you want to logout?" %}</h4>
                <p class="text-muted mb-4">{% trans "You will be logged out of your account." %}</p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">
                        {% trans "Yes, logout" %}
                    </button>
                </form>

                <a href="{% url 'post_list' %}" class="btn btn-outline-secondary w-100">
                    {% trans "Cancel" %}
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
